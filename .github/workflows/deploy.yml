name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Infrastructure And Frontend
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Terraform Variables File
        working-directory: sentiment-analysis-infrastructure
        run: |
          cat > terraform.tfvars <<EOF
          environment  = "dev"
          aws_region   = "${{ env.AWS_REGION }}"
          alert_email  = "${{ secrets.ALERT_EMAIL }}"
          third_party_api_key = "${{ secrets.THIRD_PARTY_API_KEY }}"
          EOF

      - name: Terraform Init
        working-directory: sentiment-analysis-infrastructure
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: sentiment-analysis-infrastructure
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: sentiment-analysis-infrastructure
        run: terraform apply -input=false -auto-approve tfplan

      - name: Read Terraform Outputs
        id: tf_outputs
        run: |
          API_URL="$(terraform -chdir=sentiment-analysis-infrastructure output -raw api_endpoint)"
          FRONTEND_BUCKET="$(terraform -chdir=sentiment-analysis-infrastructure output -raw frontend_bucket)"
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=${FRONTEND_BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Generate Frontend Config
        run: |
          cat > frontend/config.js <<EOF
          // Generated by GitHub Actions deploy workflow.
          window.APP_CONFIG = window.APP_CONFIG || {
            API_BASE_URL: "${{ steps.tf_outputs.outputs.api_url }}"
          };
          EOF

      - name: Deploy Frontend Assets
        run: aws s3 sync frontend/ "s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/" --delete

      - name: Post-Deploy Smoke Test
        shell: bash
        run: |
          set -euo pipefail

          API_URL="${{ steps.tf_outputs.outputs.api_url }}"
          echo "Running smoke tests against: ${API_URL}"

          analyze_code="$(curl -sS -o /tmp/analyze_response.json -w '%{http_code}' \
            -X POST "${API_URL}/analyze" \
            -H 'Content-Type: application/json' \
            -d '{"text":"CI smoke test: this service looks great","user_id":"ci-smoke"}')"

          if [ "${analyze_code}" != "200" ]; then
            echo "Smoke test failed: /analyze returned HTTP ${analyze_code}"
            cat /tmp/analyze_response.json
            exit 1
          fi

          echo "Smoke test passed: /analyze is healthy."